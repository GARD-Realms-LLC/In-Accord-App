<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>InAccord Launcher</title>
    <style>
      :root {
        --bg: #0b0d14;
        --panel: rgba(10, 12, 18, 0.72);
        --panel2: rgba(20, 24, 36, 0.72);
        --muted: #a7adc4;
        --text: #eef2ff;
        --accent: #4f8ef7;
        --danger: #e06c75;
        --border: rgba(255,255,255,0.08);
      }
      html,body { height:100%; margin:0; }
      :root, html, body { overflow: hidden !important; }
      * { -ms-overflow-style: none !important; scrollbar-width: none !important; }
      *::-webkit-scrollbar { width: 0 !important; height: 0 !important; }
      *::-webkit-scrollbar-thumb { background: transparent !important; border: 0 !important; }

      body {
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:flex-start;
        gap:12px;
        padding:18px;
        box-sizing:border-box;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
        background-size: cover;
        background-position: center;
      }

      .frame {
        width: min(820px, 100%);
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.65));
        box-shadow: 0 12px 40px rgba(0,0,0,0.55);
        overflow: hidden;
        -webkit-app-region: drag;
      }

      .topLogo {
        display:flex;
        align-items:center;
        justify-content:center;
        padding: 14px 16px 10px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        -webkit-app-region: drag;
      }

      .topLogo img {
        width: 100%;
        max-width: 780px;
        height: 180px;
        object-fit: contain;
        filter: drop-shadow(0 10px 24px rgba(0,0,0,0.55));
      }


      .header {
        position: relative;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding: 14px 16px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        -webkit-app-region: drag;
      }

      .brand {
        display:flex;
        align-items:center;
        gap:12px;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        max-width: calc(100% - 180px);
      }

      /* The splash image is used as the big top header logo. */
      .splash {
        border-radius: 10px;
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.06);
      }

      .titleWrap { text-align:center; }
      .titleWrap h2 { margin: 0; font-size: 16px; letter-spacing: 0.3px; }
      .titleWrap .sub { margin-top: 2px; font-size: 12px; color: var(--muted); }

      .content {
        display:grid;
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 14px 16px;
        flex: 1 1 auto;
        background: var(--panel2);
        -webkit-app-region: drag;
      }

      .channelBar {
        display:flex;
        gap:10px;
        align-items:center;
        flex-wrap: wrap;
        justify-content: center;
      }

      .channelBtn {
        display:inline-flex;
        align-items:center;
        gap:8px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        cursor: pointer;
        user-select: none;
      }
      .channelBtn.selected {
        border-color: rgba(79,142,247,0.65);
        box-shadow: 0 0 0 2px rgba(79,142,247,0.15) inset;
      }
      .chIcon { width: 20px; height: 20px; object-fit: contain; border-radius: 6px; }
      .chName { font-weight: 700; font-size: 12px; }

      .actions {
        display:flex;
        gap:10px;
        align-items:center;
        flex-wrap: wrap;
        justify-content: center;
      }
      button {
        padding: 9px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.08);
        background: linear-gradient(180deg, rgba(79,142,247,0.95), rgba(37,107,214,0.95));
        color: white;
        cursor: pointer;
        font-weight: 800;
        letter-spacing: 0.2px;
      }
      button.secondary { background: rgba(255,255,255,0.05); }
      button.danger { background: linear-gradient(180deg, rgba(224,108,117,0.95), rgba(185,75,84,0.95)); }
      button.success { background: linear-gradient(180deg, rgba(55, 199, 112, 0.95), rgba(34, 153, 78, 0.95)); }
      button.warning { background: linear-gradient(180deg, rgba(245, 204, 87, 0.98), rgba(214, 163, 28, 0.98)); color: #1d1600; }

      .statusWrap {
        position: relative;
      }
      .console {
        width: 100%;
        min-height: 210px;
        max-height: 320px;
        background: rgba(6, 7, 11, 0.88);
        color: #d6daf0;
        padding: 12px;
        border-radius: 12px;
        box-sizing: border-box;
        overflow: auto;
        white-space: pre-wrap;
        border: 1px solid rgba(255,255,255,0.07);
      }

      .toolbar {
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        margin-left: auto;
      }


      /* Clickable controls inside draggable regions */
      button, a, input, .console {
        -webkit-app-region: no-drag;
      }
      .btn-copy { padding:6px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: var(--muted); cursor:pointer; font-weight: 700; }

      .footer {
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        padding: 12px 16px;
        margin-top: auto;
        border-top: 1px solid var(--border);
        background: var(--panel);
        color: var(--muted);
        font-size: 12px;
        -webkit-app-region: drag;
      }
      .footerLeft { display:flex; gap:10px; align-items:center; flex-wrap: wrap; }
      .footerRight { display:flex; gap:10px; align-items:center; }
      .icon-link { color: var(--muted); display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:10px; background: rgba(255,255,255,0.02); text-decoration:none; border: 1px solid rgba(255,255,255,0.06); }
      .icon-link:hover { color: var(--accent); background: rgba(79,142,247,0.10); }
      .icon-svg { width:20px; height:20px; }

      button:focus { outline: 2px solid rgba(79,142,247,0.22); }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="topLogo">
        <img id="splash" alt="InAccord" class="splash" />
      </div>
      <div class="header">
        <div style="position:absolute; left:8px; top:8px; z-index:50; -webkit-app-region: no-drag;">
          <button id="minimizeBtn" class="btn-copy" title="Minimize to tray" style="padding:6px; width:32px; height:32px; display:flex; align-items:center; justify-content:center;">
            <img id="minimizeIcon" alt="Minimize" style="width:16px; height:16px; display:block;" />
          </button>
        </div>
        <div class="brand">
          <div class="titleWrap">
            <h2>In-Accord Launcher / Installer</h2>
            <div class="sub" id="subLine">Ready</div>
          </div>
        </div>
        <div class="toolbar">
          <button id="changelogBtn" class="btn-copy" title="Open changelog">Changelog</button>
        </div>
      </div>

      <div class="content">
        <div class="channelBar" id="channelBar"></div>
        <input id="channel" type="hidden" value="stable" />

        <div class="actions">
          <button id="installBtn">Install</button>
          <button id="uninstallBtn" class="danger">Uninstall</button>
          <button id="launchBtn" class="success">Launch</button>
          <button id="refreshBtn" class="warning">Refresh</button>
          <button id="cancelBtn" class="secondary">Close</button>
        </div>

        <div class="statusWrap">
          <pre id="output" class="console"></pre>
        </div>

        <div class="toolbar">
          <div style="display:flex; gap:8px;">
            <button id="copyBtn" class="btn-copy">Copy Status</button>
            <button id="openLogsBtn" class="btn-copy" title="Open InAccord data folder">Open Logs</button>
          </div>
        </div>
      </div>

      <div class="footer">
        <div class="footerLeft">
          <div id="footer">In-Accord © 2025 / 2026 | G.A.R.D. Realms LLC</div>
          <div id="footer2"></div>
        </div>
        <div class="footerRight">
          <a class="icon-link" id="githubLink" href="#" data-url="https://github.com/GARD-Realms-LLC/In-Accord-App" title="GitHub">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.73.5.75 5.48.75 11.77c0 4.93 3.19 9.11 7.61 10.59.56.1.76-.24.76-.53 0-.26-.01-.95-.01-1.86-3.09.67-3.74-.73-3.98-1.4-.13-.34-.7-1.4-1.2-1.68-.41-.22-1-.77-.01-.79.93-.02 1.6.86 1.82 1.22 1.06 1.82 2.75 1.3 3.42.99.11-.78.41-1.3.75-1.6-2.77-.31-5.68-1.39-5.68-6.17 0-1.36.49-2.47 1.3-3.34-.13-.32-.57-1.61.12-3.35 0 0 1.06-.34 3.48 1.28 1.01-.28 2.09-.42 3.16-.42 1.07 0 2.15.14 3.16.42 2.42-1.62 3.48-1.28 3.48-1.28.69 1.74.25 3.03.12 3.35.81.87 1.3 1.98 1.3 3.34 0 4.79-2.92 5.85-5.7 6.16.42.36.8 1.07.8 2.16 0 1.56-.01 2.82-.01 3.2 0 .29.2.64.77.53 4.42-1.49 7.61-5.66 7.61-10.59C23.25 5.48 18.27.5 12 .5z"/></svg>
          </a>
          <a class="icon-link" id="discordLink" href="#" data-url="https://discord.com/channels/1418648743544094871" title="Discord Server">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.317 4.369a19.791 19.791 0 00-4.885-1.515.07.07 0 00-.075.037c-.21.375-.444.864-.608 1.249-1.844-.276-3.68-.276-5.486 0-.164-.396-.418-.874-.628-1.249a.07.07 0 00-.075-.037 19.736 19.736 0 00-4.885 1.515.064.064 0 00-.03.027C2.99 9.045 2.17 13.57 2.67 18.053c.042.27.17.54.387.73a19.9 19.9 0 005.993 3.02.07.07 0 00.078-.027c.463-.63.873-1.297 1.219-1.994a.07.07 0 00-.038-.098 13.06 13.06 0 01-1.872-.892.07.07 0 01-.007-.116c.126-.094.252-.19.374-.287a.07.07 0 01.076-.007c3.93 1.78 8.18 1.78 12.032 0a.07.07 0 01.078.007c.122.097.248.193.374.287a.07.07 0 01-.007.116c-.57.36-1.176.7-1.872.892a.07.07 0 00-.038.098c.36.695.77 1.364 1.219 1.994a.07.07 0 00.078.027 19.9 19.9 0 005.993-3.02c.217-.19.345-.46.387-.73.5-4.484-.32-9.009-2.927-13.657a.063.063 0 00-.03-.027zM8.02 15.331c-1.182 0-2.156-1.085-2.156-2.419 0-1.333.955-2.418 2.156-2.418 1.21 0 2.183 1.095 2.156 2.418 0 1.334-.955 2.419-2.156 2.419zm7.975 0c-1.182 0-2.156-1.085-2.156-2.419 0-1.333.955-2.418 2.156-2.418 1.21 0 2.183 1.095 2.156 2.418 0 1.334-.946 2.419-2.156 2.419z"/></svg>
          </a>
          <a class="icon-link" id="websiteLink" href="#" data-url="http://www.in-accord.net" title="Website">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm5.93 6h-3.02a15.9 15.9 0 00-1.16-3.02A8.02 8.02 0 0117.93 8zM12 4.07c.63 1.05 1.18 2.4 1.63 3.93H10.37c.45-1.53 1-2.88 1.63-3.93zM6.07 8A8.02 8.02 0 016.25 5.98 15.9 15.9 0 005.09 9H2.07A8.04 8.04 0 016.07 8zM4.07 12c0-.34.02-.67.06-1h3.06c-.03.33-.05.66-.05 1s.02.67.05 1H4.13c-.04-.33-.06-.66-.06-1zm1.98 4h3.02a15.9 15.9 0 001.16 3.02A8.02 8.02 0 016.05 16zM12 19.93c-.63-1.05-1.18-2.4-1.63-3.93h3.26c-.45 1.53-1 2.88-1.63 3.93zM17.93 16a8.02 8.02 0 01-3.02 2.02c-.45-1.05-1-2.4-1.63-3.93h3.02c.04.33.06.66.06 1z"/></svg>
          </a>
          <a class="icon-link" id="donateLink" href="#" data-url="https://www.gofundme.com/" title="Donate">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 21s-7.5-4.35-9.5-7.5C.94 9.94 6 4.5 12 8c6-3.5 11.06 1.94 9 5.5C19.5 16.65 12 21 12 21z"/></svg>
          </a>
          <a class="icon-link" id="emailLink" href="#" data-url="mailto:docrst@gmail.com" title="Email">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </a>
        </div>
      </div>
    </div>

    <script>
      const channelEl = document.getElementById('channel');
      const channelBar = document.getElementById('channelBar');
      const installBtn = document.getElementById('installBtn');
      const uninstallBtn = document.getElementById('uninstallBtn');
      const launchBtn = document.getElementById('launchBtn');
      const refreshBtn = document.getElementById('refreshBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const output = document.getElementById('output');
      const splash = document.getElementById('splash');
      const footer = document.getElementById('footer');
      const footer2 = document.getElementById('footer2');
      const subLine = document.getElementById('subLine');
      const openLogsBtn = document.getElementById('openLogsBtn');

      let CHANGELOG_URL = 'https://github.com/GARD-Realms-LLC/In-Accord-App';

      function append(text) { output.textContent += text + '\n'; }

      function setText(text) { output.textContent = String(text || ''); }

      function json(v) { try { return JSON.stringify(v, null, 2); } catch { return String(v); } }

      function normalizeChannel(c) {
        const x = String(c || 'stable').toLowerCase();
        if (x === 'ptb') return 'ptb';
        if (x === 'canary') return 'canary';
        if (x === 'development' || x === 'dev') return 'development';
        return 'stable';
      }

      async function refreshStatus() {
        try {
          if (!window.iaLauncher || !window.iaLauncher.getStatus) {
            setText('Launcher preload API missing.');
            return;
          }
          const st = await window.iaLauncher.getStatus();
          if (!st || !st.ok) {
            setText('Status error: ' + (st && st.error ? st.error : 'unknown'));
            return;
          }
          const ch = normalizeChannel(channelEl.value);
          const chSt = (st.channels && st.channels[ch]) ? st.channels[ch] : null;

          let txt = '';
          txt += 'InAccord Launcher Status\n';
          txt += 'Time: ' + (st.now || '') + '\n';
          txt += 'Channel: ' + ch + '\n\n';

          try {
            if (st.launcherExe && st.launcherExe.path) {
              const fp = `${st.launcherExe.bytes || 0}@${Math.floor(st.launcherExe.mtimeMs || 0)}`;
              txt += 'Launcher EXE: ' + st.launcherExe.path + '\n';
              txt += 'Launcher FP: ' + fp + '\n\n';
            }
          } catch {}

          try {
            if (typeof st.buildSeq === 'number') {
              txt += 'Build: ' + st.buildSeq + '\n\n';
            }
          } catch {}

          if (st.discordVersions && st.discordVersions.channels) {
            const d = st.discordVersions.channels;
            const row = (k) => {
              const it = d[k];
              if (!it) return '';
              return `${k}: ${it.latest || 'not installed'}`;
            };
            txt += 'Discord installs (LOCALAPPDATA):\n';
            txt += '  ' + row('stable') + '\n';
            txt += '  ' + row('ptb') + '\n';
            txt += '  ' + row('canary') + '\n';
            txt += '  ' + row('development') + '\n\n';
          }

          if (chSt) {
            txt += 'Payload installed: ' + (chSt.payload && chSt.payload.ok ? 'YES' : 'NO') + '\n';
            txt += 'Core patch: ' + (chSt.coreIndex && chSt.coreIndex.patched ? 'YES' : 'NO') + '\n';
            txt += 'app.asar patch: ' + (chSt.appAsar && chSt.appAsar.patched ? 'YES' : 'NO') + '\n\n';

            const markerBase = (chSt.markers && chSt.markers.paths && chSt.markers.paths.base) ? chSt.markers.paths.base : 'unknown';
            txt += 'Latest markers (' + markerBase + '):\n';
            const m = chSt.markers || {};
            if (m.preloadLoaded) txt += '  preload_loaded: yes\n'; else txt += '  preload_loaded: no\n';
            if (m.mainhookLoaded) txt += '  mainhook_loaded: yes\n'; else txt += '  mainhook_loaded: no\n';
            if (m.injectStatus) txt += '  inject_status: ' + (m.injectStatus.status || 'unknown') + '\n';
            txt += '\n';

            const injectTail = (m.injectLogTail || []).slice(-60);
            if (injectTail.length) {
              txt += 'Inject log (tail):\n';
              injectTail.forEach(l => { txt += '  ' + l + '\n'; });
              txt += '\n';
            }
          }

          setText(txt);

          try {
            const base = (chSt && chSt.markers && chSt.markers.paths && chSt.markers.paths.base) ? chSt.markers.paths.base : '';
            if (footer2) footer2.textContent = `v${st.version || 'unknown'}${base ? ' | ' + base : ''}`;
          } catch {}
          try {
            if (subLine) subLine.textContent = `Channel: ${ch}`;
          } catch {}
        } catch (e) {
          setText('Status exception: ' + String(e && e.stack ? e.stack : e));
        }
      }

      (async function initChangelog() {
        try {
          if (!window.iaLauncher || !window.iaLauncher.getChangelog) return;
          const res = await window.iaLauncher.getChangelog();
          if (!res || !res.ok) return;

          if (res.releaseUrl) CHANGELOG_URL = res.releaseUrl;
        } catch (e) {
          // Keep the UI usable even if GitHub is blocked.
        }
      })();

      (async function initSplash() {
        try {
          if (!window.iaLauncher || !window.iaLauncher.getAssetPath) return;
          const tryNames = ['splash.png'];
          for (const n of tryNames) {
            const res = await window.iaLauncher.getAssetPath(n);
            if (res && res.ok && res.exists && res.path) {
              splash.src = 'file:///' + String(res.path).replace(/\\\\/g, '/');
              try { splash.style.display = ''; } catch {}
              return;
            }
          }
        } catch {}
        try {
          const top = splash && typeof splash.closest === 'function' ? splash.closest('.topLogo') : null;
          if (top) top.style.display = 'none';
          else splash.style.display = 'none';
        } catch {
          try { splash.style.display = 'none'; } catch {}
        }
      })();

      (async function initBackground() {
        try {
          if (!window.iaLauncher || !window.iaLauncher.getAssetPath) return;
          const res = await window.iaLauncher.getAssetPath('background.png');
          if (res && res.ok && res.exists && res.path) {
            document.body.style.backgroundImage = `url('file:///${String(res.path).replace(/\\/g, '/')}')`;
          }
        } catch {}
      })();

      (async function initChannels() {
        try {
          const items = [
            {id: 'stable', label: 'Stable', icon: 'stable.png'},
            {id: 'ptb', label: 'PTB', icon: 'ptb.png'},
            {id: 'canary', label: 'Canary', icon: 'canary.png'},
            {id: 'development', label: 'Dev', icon: 'development.png'}
          ];

          const setSelected = (id) => {
            channelEl.value = id;
            const btns = channelBar ? Array.from(channelBar.querySelectorAll('.channelBtn')) : [];
            btns.forEach(b => b.classList.toggle('selected', b.getAttribute('data-channel') === id));
          };

          if (!channelBar) return;
          channelBar.innerHTML = '';

          for (const it of items) {
            const b = document.createElement('button');
            b.className = 'channelBtn' + (it.id === 'stable' ? ' selected' : '');
            b.setAttribute('data-channel', it.id);
            b.type = 'button';
            b.addEventListener('click', async () => {
              setSelected(it.id);
              await refreshStatus();
            });

            const img = document.createElement('img');
            img.className = 'chIcon';
            img.alt = it.label;
            try {
              if (window.iaLauncher && window.iaLauncher.getAssetPath) {
                const r = await window.iaLauncher.getAssetPath(it.icon);
                if (r && r.ok && r.exists && r.path) img.src = 'file:///' + String(r.path).replace(/\\/g, '/');
              }
            } catch {}

            const span = document.createElement('span');
            span.className = 'chName';
            span.textContent = it.label;

            b.appendChild(img);
            b.appendChild(span);
            channelBar.appendChild(b);
          }
          setSelected('stable');
        } catch {}
      })();

      // Initial status on load
      refreshStatus();

      installBtn.addEventListener('click', async () => {
        const ch = normalizeChannel(channelEl.value);
        setText('Installing for ' + ch + '...');
        const res = await window.iaLauncher.install(ch, 'win32');
        append('Exit code: ' + res.code);
        append(res.output || '(no output)');
        if (res.code !== 0) window.iaLauncher.showError('Install failed — see status box');
        await refreshStatus();
      });

      uninstallBtn.addEventListener('click', async () => {
        const ch = normalizeChannel(channelEl.value);
        setText('Uninstalling for ' + ch + '...');
        const res = await window.iaLauncher.uninstall(ch);
        append('Exit code: ' + res.code);
        append(res.output || '(no output)');
        if (res.code !== 0) window.iaLauncher.showError('Uninstall failed — see status box');
        await refreshStatus();
      });

      launchBtn.addEventListener('click', async () => {
        const ch = normalizeChannel(channelEl.value);
        append('Launching ' + ch + '...');
        const res = await window.iaLauncher.launch(ch, 'win32');
        append('Exit code: ' + res.code);
        append(res.output || '(no output)');
        if (res.code !== 0) window.iaLauncher.showError('Launch failed — see status box');
        await refreshStatus();
      });

      refreshBtn.addEventListener('click', async () => {
        await refreshStatus();
      });

      cancelBtn.addEventListener('click', () => { window.close(); });

      const copyBtn = document.getElementById('copyBtn');
      copyBtn.addEventListener('click', async () => {
        const text = output.textContent || '';
        try {
          // Use the Electron main clipboard via preload for reliability
          if (window.iaLauncher && window.iaLauncher.copyToClipboard) {
            const res = await window.iaLauncher.copyToClipboard(text);
            if (res && res.ok) append('Copied output to clipboard');
            else append('Copy failed: ' + (res && res.error ? res.error : 'unknown'));
          } else if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            append('Copied output to clipboard (navigator)');
          } else {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            append('Copied output to clipboard (fallback)');
          }
        } catch (err) {
          append('Copy failed: ' + String(err));
        }
      });

      // Changelog button opens the GitHub repo using the external handler
      const changelogBtn = document.getElementById('changelogBtn');
      changelogBtn.addEventListener('click', async (ev) => {
        ev.preventDefault();
        try {
          if (window.iaLauncher && window.iaLauncher.openExternal) {
            const res = await window.iaLauncher.openExternal(CHANGELOG_URL);
            if (!res || !res.ok) append('Failed to open changelog: ' + (res && res.error ? res.error : 'unknown'));
          } else {
            window.open(CHANGELOG_URL, '_blank', 'noopener,noreferrer');
          }
        } catch (err) { append('open changelog error: ' + String(err)); }
      });

      openLogsBtn.addEventListener('click', async () => {
        try {
          const st = await window.iaLauncher.getStatus();
          const dir = (st && st.launcherLogsDir) ? st.launcherLogsDir : '';
          if (!dir) return;
          // Open folder via file://
          await window.iaLauncher.openExternal('file:///' + String(dir).replace(/\\\\/g, '/'));
        } catch {}
      });

      // Minimize to tray handler
      const minimizeBtn = document.getElementById('minimizeBtn');
      if (minimizeBtn) {
        minimizeBtn.addEventListener('click', async (ev) => {
          ev.preventDefault();
          try {
            if (window.iaLauncher && window.iaLauncher.minimizeToTray) {
              const res = await window.iaLauncher.minimizeToTray();
              if (!res || !res.ok) append('Minimize-to-tray failed: ' + (res && res.error ? res.error : 'unknown'));
            } else {
              try { window.close(); } catch {}
            }
          } catch (err) { append('minimize error: ' + String(err)); }
        });

        // Load icon image for the button from packaged assets
        (async function initMinimizeIcon() {
          try {
            if (!window.iaLauncher || !window.iaLauncher.getAssetPath) return;
            const tryNames = [
              'build/.tmp-icon/icon-16.png',
              'build/.tmp-icon/icon-24.png',
              'build/.tmp-icon/icon-32.png',
              'build/.tmp-icon/icon-48.png'
            ];
            for (const n of tryNames) {
              try {
                const r = await window.iaLauncher.getAssetPath(n);
                if (r && r.ok && r.exists && r.path) {
                  const img = document.getElementById('minimizeIcon');
                  if (img) img.src = 'file:///' + String(r.path).replace(/\\/g, '/');
                  return;
                }
              } catch {}
            }
            // Fallback: use embedded SVG minus icon so button isn't a broken image
            try {
              const img = document.getElementById('minimizeIcon');
              if (img) {
                const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' ry='3' fill='%234f8ef7'/><rect x='3' y='7' width='10' height='2' rx='1' ry='1' fill='white'/></svg>`;
                img.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
              }
            } catch {}
          } catch {}
        })();
      }

      // Auto-run removed; user must click Install or Launch.
      // Wire footer icon clicks to openExternal via preload bridge
      function openIcon(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('click', async (ev) => {
          ev.preventDefault();
          const url = el.getAttribute('data-url');
          if (!url) return;
          try {
            if (window.iaLauncher && window.iaLauncher.openExternal) {
              const res = await window.iaLauncher.openExternal(url);
              if (!res || !res.ok) append('Failed to open: ' + (res && res.error ? res.error : 'unknown'));
            } else {
              // fallback to window.open
              window.open(url, '_blank', 'noopener,noreferrer');
            }
          } catch (err) {
            append('openExternal error: ' + String(err));
          }
        });
      }
      ['githubLink','discordLink','websiteLink','donateLink','emailLink'].forEach(openIcon);
    </script>
  </body>
</html>
